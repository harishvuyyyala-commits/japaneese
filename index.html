<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>🎌 Japanese Smart Trainer</title>
  <style>
    :root{
      --bg:#080814;--surface:#10102a;--card:#161630;--border:#22224a;
      --primary:#e63946;--secondary:#457b9d;--accent:#f4a261;
      --green:#2a9d8f;--red:#e76f51;--yellow:#e9c46a;--purple:#9b59b6;
      --text:#edf2f4;--muted:#8d99ae;--dim:#3a3a6a;
      --r:18px;--tr:.25s ease;--sh:0 8px 40px rgba(0,0,0,.7);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;
      overflow-x:hidden;-webkit-font-smoothing:antialiased;
    }

    /* ── AMBIENT BACKGROUND ── */
    .amb{
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 15%, rgba(230,57,70,.09) 0%,transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 85%, rgba(69,123,157,.09) 0%,transparent 70%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(155,89,182,.04) 0%,transparent 70%);
      animation:ambShift 12s ease-in-out infinite alternate;
    }
    @keyframes ambShift{
      from{filter:hue-rotate(0deg) brightness(1);}
      to  {filter:hue-rotate(20deg) brightness(1.08);}
    }

    /* ── FLOATING KANJI BG ── */
    #bgKanji{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .bk{
      position:absolute;bottom:-100px;
      font-size:80px;font-weight:900;opacity:0;color:var(--primary);
      animation:floatUp linear infinite;
      text-shadow:0 0 40px currentColor;
    }
    @keyframes floatUp{
      0%  {opacity:0;  transform:translateY(0)   rotate(0deg)  scale(.8);}
      8%  {opacity:.04;}
      90% {opacity:.04;}
      100%{opacity:0;  transform:translateY(-105vh) rotate(360deg) scale(1.2);}
    }

    /* ── HEADER ── */
    .hdr{
      background:rgba(16,16,42,.88);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);padding:10px 16px;
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }
    .logo{font-size:18px;font-weight:900;color:var(--primary);letter-spacing:-.5px;white-space:nowrap;
      text-shadow:0 0 20px rgba(230,57,70,.5);}
    .score-pill{
      display:flex;align-items:center;gap:4px;min-width:60px;justify-content:center;
      background:rgba(233,196,106,.08);border:1px solid rgba(233,196,106,.22);
      color:var(--yellow);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:800;
      transition:transform .2s,box-shadow .2s;
    }
    .score-pill.bump{transform:scale(1.35);box-shadow:0 0 16px rgba(233,196,106,.5);}
    .mode-toggle{display:flex;background:rgba(0,0,0,.35);border-radius:10px;padding:3px;border:1px solid var(--border);gap:2px;}
    .mode-btn{
      padding:7px 14px;border:none;background:transparent;
      color:var(--muted);font-size:12px;font-weight:700;
      border-radius:8px;cursor:pointer;transition:var(--tr);white-space:nowrap;
    }
    .mode-btn.active{
      background:linear-gradient(135deg,var(--primary),#c1121f);color:#fff;
      box-shadow:0 3px 14px rgba(230,57,70,.45);
    }

    /* ── MAIN ── */
    .main{max-width:480px;margin:0 auto;padding:16px 14px 120px;position:relative;z-index:1;}

    /* ── STUDY CARD ── */
    .s-card-wrap{
      perspective:1200px;
      animation:cardIn .4s cubic-bezier(.23,1,.32,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(22px) scale(.96);}to{opacity:1;transform:none;}}
    .s-card-wrap:hover .study-card{
      transform:perspective(1200px) rotateY(var(--ty,0deg)) rotateX(var(--tx,0deg)) scale(1.015);
      box-shadow:0 16px 48px rgba(0,0,0,.7),0 0 30px rgba(69,123,157,.12);
    }
    .study-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);padding:22px 20px;
      box-shadow:var(--sh);margin-bottom:14px;
      transition:transform .12s ease,box-shadow .12s ease;
      transform-style:preserve-3d;
    }
    .word-kanji{
      font-size:64px;font-weight:900;text-align:center;line-height:1.1;margin-bottom:6px;
      cursor:pointer;text-shadow:0 0 50px rgba(230,57,70,.35);
      transition:transform .15s,text-shadow .15s;display:block;
    }
    .word-kanji:hover{transform:scale(1.1);text-shadow:0 0 70px rgba(230,57,70,.6);}
    .word-reading{text-align:center;margin-bottom:10px;}
    .hiragana{font-size:21px;color:var(--secondary);margin-right:8px;}
    .romaji{font-size:13px;color:var(--muted);font-style:italic;}
    .snd-btn{
      display:flex;align-items:center;justify-content:center;gap:5px;
      background:rgba(69,123,157,.1);border:1px solid rgba(69,123,157,.28);
      color:var(--secondary);border-radius:9px;padding:7px 16px;
      cursor:pointer;font-size:14px;margin:8px auto 10px;width:fit-content;
      transition:var(--tr);
    }
    .snd-btn:hover{background:rgba(69,123,157,.25);transform:scale(1.05);box-shadow:0 4px 14px rgba(69,123,157,.3);}
    .snd-btn:active{transform:scale(.96);}
    .meanings{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
    .tag-en{background:rgba(42,157,143,.1);border:1px solid rgba(42,157,143,.28);color:var(--green);padding:4px 13px;border-radius:20px;font-size:14px;font-weight:600;}
    .tag-te{background:rgba(244,162,97,.1);border:1px solid rgba(244,162,97,.28);color:var(--accent);padding:4px 13px;border-radius:20px;font-size:13px;}
    .te-pron{text-align:center;font-size:12px;color:var(--muted);margin-bottom:8px;}
    .prog-row{display:flex;align-items:center;justify-content:space-between;margin:10px 0 5px;gap:8px;}
    .sbadge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 9px;border-radius:10px;}
    .s-new    {background:rgba(155,89,182,.15);color:var(--purple);border:1px solid rgba(155,89,182,.3);}
    .s-learning{background:rgba(244,162,97,.12);color:var(--accent);border:1px solid rgba(244,162,97,.28);}
    .s-strong {background:rgba(42,157,143,.12);color:var(--green);border:1px solid rgba(42,157,143,.28);}
    .sc-tag{font-size:12px;color:var(--muted);}
    .sc-bar-w{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px;}
    .sc-bar-f{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.23,1,.32,1);}
    .divider{height:1px;background:var(--border);margin:12px 0;}
    .sec-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
    .ltr-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
    .ltr-box{
      background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 13px;
      text-align:center;min-width:60px;transition:var(--tr);cursor:default;
    }
    .ltr-box:hover{border-color:var(--secondary);transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.4);}
    .ltr-jp{font-size:26px;display:block;}
    .ltr-te{font-size:12px;color:var(--accent);display:block;margin-top:2px;}
    .desc{background:rgba(15,52,96,.22);border-left:3px solid var(--secondary);padding:10px 14px;border-radius:0 9px 9px 0;font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px;}
    .ex-card{background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;transition:var(--tr);}
    .ex-card:hover{border-color:var(--dim);}
    .ex-jp{font-size:17px;line-height:1.5;margin-bottom:4px;}
    .ex-rom{font-size:12px;color:var(--dim);font-style:italic;margin-bottom:3px;}
    .ex-te{font-size:13px;color:var(--accent);margin-bottom:4px;}
    .ex-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
    .ex-en{font-size:13px;color:var(--green);}
    .ex-te2{font-size:13px;color:var(--accent);}
    .ex-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
    .ex-snd{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;transition:var(--tr);}
    .ex-snd:hover{color:var(--secondary);transform:scale(1.3);}
    .smr-btn{background:transparent;border:none;color:var(--secondary);font-size:12px;cursor:pointer;text-decoration:underline;padding:3px;}
    .bk-wrap{margin-top:8px;overflow-x:auto;display:none;}
    .bk-tbl{width:100%;border-collapse:collapse;font-size:13px;}
    .bk-tbl th{text-align:left;color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;padding:4px 8px;border-bottom:1px solid var(--border);}
    .bk-tbl td{padding:6px 8px;border-bottom:1px solid rgba(34,34,74,.5);}
    .bk-tbl td:nth-child(2){color:var(--green);}
    .bk-tbl td:nth-child(3){color:var(--accent);}
    .exp-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:9px;background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:10px;cursor:pointer;font-size:12px;margin-top:10px;transition:var(--tr);}
    .exp-btn:hover{border-color:var(--secondary);color:var(--secondary);}

    /* ── NAV BAR ── */
    .nav-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:rgba(16,16,42,.92);backdrop-filter:blur(14px);
      border-top:1px solid var(--border);padding:10px 16px;z-index:100;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .nav-info{font-size:13px;color:var(--muted);text-align:center;flex:1;}
    .nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:11px 22px;border-radius:11px;cursor:pointer;font-size:18px;transition:var(--tr);}
    .nav-btn:hover:not(:disabled){border-color:var(--secondary);background:rgba(69,123,157,.12);}
    .nav-btn:active:not(:disabled){transform:scale(.94);}
    .nav-btn:disabled{opacity:.2;cursor:not-allowed;}

    /* ══════════════════════════════════════
       EXAM — 3D FLIP CARD
    ══════════════════════════════════════ */
    .flip-scene{
      perspective:1400px;
      width:100%;min-height:280px;margin-bottom:14px;
      position:relative;
    }
    .flip-card{
      width:100%;min-height:280px;position:relative;
      transform-style:preserve-3d;
      transition:transform .7s cubic-bezier(.23,1,.32,1);
    }
    .flip-card.flipped{transform:rotateY(180deg);}

    .flip-face{
      position:absolute;top:0;left:0;right:0;
      min-height:280px;
      backface-visibility:hidden;-webkit-backface-visibility:hidden;
      border-radius:var(--r);padding:28px 20px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;
    }
    .flip-front{
      background:linear-gradient(145deg,var(--card),#1e1e3e);
      border:2px solid var(--border);
      box-shadow:var(--sh);
    }
    .flip-back{
      background:linear-gradient(145deg,#0e2a22,#162830);
      border:2px solid var(--green);
      transform:rotateY(180deg);
      box-shadow:0 8px 40px rgba(42,157,143,.25);
    }
    .flip-back.wrong-back{
      background:linear-gradient(145deg,#2a100e,#2e1410);
      border-color:var(--red);
      box-shadow:0 8px 40px rgba(231,111,81,.25);
    }

    /* Question stimulus */
    .q-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:16px;background:rgba(255,255,255,.05);padding:4px 12px;border-radius:20px;}
    .q-kanji{font-size:72px;font-weight:900;line-height:1;text-shadow:0 0 50px rgba(69,123,157,.5);margin-bottom:8px;}
    .q-hira {font-size:24px;color:var(--secondary);margin-bottom:4px;}
    .q-rom  {font-size:14px;color:var(--muted);font-style:italic;margin-bottom:4px;}
    .q-tepron{font-size:16px;color:var(--accent);margin-bottom:8px;}
    .q-single{font-size:32px;font-weight:800;}
    .q-te{color:var(--accent);}

    /* Answer back face */
    .ans-kanji{font-size:58px;font-weight:900;text-shadow:0 0 40px rgba(42,157,143,.5);margin-bottom:6px;}
    .ans-hira {font-size:20px;color:var(--secondary);margin-bottom:4px;}
    .ans-means{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
    .ans-pron {font-size:13px;color:var(--accent);margin-top:4px;}

    /* Exam progress */
    .ex-header{margin-bottom:12px;animation:slideIn .3s ease;}
    .ex-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;color:var(--muted);}
    .ex-pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
    .ex-pfill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .6s ease;}

    /* Exam buttons */
    .exam-btns{display:flex;flex-direction:column;gap:10px;animation:slideIn .35s ease .05s both;}
    .btn-row{display:flex;gap:10px;}
    .ebtn{
      flex:1;padding:15px 10px;border:none;border-radius:13px;
      font-size:14px;font-weight:700;cursor:pointer;
      transition:transform .15s,box-shadow .15s,background .2s;
      letter-spacing:.2px;position:relative;overflow:hidden;
    }
    .ebtn::after{
      content:'';position:absolute;inset:0;background:white;opacity:0;
      border-radius:inherit;transition:opacity .15s;
    }
    .ebtn:active::after{opacity:.08;}
    .ebtn:active{transform:scale(.96)!important;}
    .eg{background:rgba(42,157,143,.12);border:1.5px solid var(--green);color:var(--green);}
    .eg:hover{background:var(--green);color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(42,157,143,.45);}
    .er{background:rgba(231,111,81,.12);border:1.5px solid var(--red);color:var(--red);}
    .er:hover{background:var(--red);color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(231,111,81,.45);}
    .eb{background:rgba(69,123,157,.12);border:1.5px solid var(--secondary);color:var(--secondary);}
    .eb:hover{background:var(--secondary);color:#fff;transform:translateY(-2px);}
    .egh{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
    .egh:hover{border-color:var(--muted);color:var(--text);}
    .score-hint{
      text-align:center;font-size:11px;color:var(--dim);margin-top:-4px;
      display:flex;justify-content:space-around;padding:0 4px;
    }
    .sh-g{color:rgba(42,157,143,.6);}
    .sh-r{color:rgba(231,111,81,.6);}
    .sh-b{color:rgba(69,123,157,.6);}

    /* Confirm buttons (after self-check) */
    .confirm-area{animation:slideUp .35s cubic-bezier(.23,1,.32,1);}
    .confirm-hint{
      text-align:center;padding:10px;border-radius:10px;margin-bottom:10px;
      font-size:14px;font-weight:600;
      background:rgba(42,157,143,.08);border:1px solid rgba(42,157,143,.2);color:var(--green);
    }
    .confirm-hint.wrong{background:rgba(231,111,81,.08);border-color:rgba(231,111,81,.2);color:var(--red);}

    /* MCQ */
    .mcq-area{animation:slideUp .35s cubic-bezier(.23,1,.32,1);}
    .mcq-label{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px;}
    .mcq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .mopt{
      padding:16px 10px;background:rgba(0,0,0,.3);
      border:1.5px solid var(--border);border-radius:13px;
      cursor:pointer;text-align:center;transition:var(--tr);
      transform-style:preserve-3d;
    }
    .mopt:hover{
      border-color:var(--secondary);background:rgba(69,123,157,.1);
      transform:translateY(-3px) scale(1.03);box-shadow:0 8px 20px rgba(0,0,0,.4);
    }
    .mopt:active{transform:scale(.95);}
    .mopt-jp{display:block;font-size:30px;font-weight:900;color:var(--text);text-shadow:0 0 20px rgba(255,255,255,.1);}
    .mopt-rom{display:block;font-size:11px;color:var(--muted);margin-top:2px;}
    .mopt-en{display:block;font-size:15px;font-weight:700;color:var(--text);}
    .mopt-te{display:block;font-size:13px;color:var(--accent);margin-top:3px;}
    .mopt.c{border-color:var(--green)!important;background:rgba(42,157,143,.18)!important;pointer-events:none;animation:correctPop .5s ease;}
    .mopt.w{border-color:var(--red)!important;background:rgba(231,111,81,.18)!important;pointer-events:none;animation:shake .4s ease;}

    /* Exam complete */
    .complete{text-align:center;padding:30px 10px;animation:slideIn .4s ease;}
    .c-icon{font-size:80px;margin-bottom:14px;display:block;animation:bounce 1s ease infinite;}
    .c-title{font-size:30px;font-weight:900;margin-bottom:8px;
      background:linear-gradient(135deg,var(--yellow),var(--accent));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .c-sub{color:var(--muted);margin-bottom:20px;font-size:15px;}
    .stats-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:20px;}
    .stat-box{text-align:center;}
    .stat-val{font-size:28px;font-weight:900;display:block;}
    .stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
    .big-btn{display:inline-block;padding:14px 28px;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;transition:var(--tr);margin:5px;
      background:linear-gradient(135deg,var(--primary),#c1121f);color:#fff;
      box-shadow:0 4px 20px rgba(230,57,70,.4);}
    .big-btn:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(230,57,70,.5);}
    .big-btn.ghost{background:transparent;border:2px solid var(--border);color:var(--text);box-shadow:none;}
    .big-btn.ghost:hover{border-color:var(--secondary);box-shadow:none;}

    /* Toast */
    .toast{
      position:fixed;top:68px;right:16px;
      padding:8px 20px;border-radius:10px;font-weight:900;font-size:24px;
      z-index:300;pointer-events:none;animation:toastFade 1.6s ease forwards;
      backdrop-filter:blur(10px);border:1.5px solid;
    }
    .toast.pos{color:var(--green);border-color:rgba(42,157,143,.4);background:rgba(42,157,143,.12);}
    .toast.neg{color:var(--red);  border-color:rgba(231,111,81,.4); background:rgba(231,111,81,.12);}

    /* Confetti */
    .conf{
      position:fixed;width:9px;height:9px;top:-20px;
      pointer-events:none;z-index:400;
      animation:confFall linear forwards;
    }

    /* Flash overlay */
    #flashOv{
      position:fixed;inset:0;pointer-events:none;z-index:200;
      opacity:0;transition:opacity .1s;border-radius:0;
    }
    #flashOv.flash-g{background:rgba(42,157,143,.12);opacity:1;}
    #flashOv.flash-r{background:rgba(231,111,81,.12);opacity:1;}

    /* Error */
    .err{background:rgba(231,111,81,.08);border:1px solid var(--red);border-radius:var(--r);padding:24px;text-align:center;color:var(--red);margin:20px 0;}
    .err pre{font-size:11px;margin-top:8px;background:rgba(0,0,0,.3);padding:10px;border-radius:8px;text-align:left;overflow-x:auto;}
    .err code{font-size:12px;background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;}
    .empty{text-align:center;padding:60px 20px;color:var(--muted);}

    /* ── KEYFRAMES ── */
    @keyframes slideIn  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes slideUp  {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
    @keyframes cardIn   {from{opacity:0;transform:translateY(22px) scale(.96)}to{opacity:1;transform:none}}
    @keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
    @keyframes shake    {0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
    @keyframes toastFade{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-10px) scale(1.1)}100%{opacity:0;transform:translateY(-28px) scale(.9)}}
    @keyframes bounce   {0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @keyframes confFall {0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(100vh) rotate(820deg) scale(.4)}}
    @keyframes glow     {0%,100%{box-shadow:0 0 8px rgba(42,157,143,.3)}50%{box-shadow:0 0 24px rgba(42,157,143,.7)}}
  </style>
</head>
<body>
  <div class="amb"></div>
  <div id="bgKanji"></div>
  <div id="flashOv"></div>
